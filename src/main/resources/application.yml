spring:
  application:
    name: api-spring-ai
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:taskdb}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api/v1
      chat:
        completions-path: /chat/completions
        options:
          model: google/gemini-2.0-flash-001
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s

app:
  jwt:
    secret: ${JWT_SECRET:9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9}
    expiration: 86400000

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://db:5432/${POSTGRES_DB:taskdb}
